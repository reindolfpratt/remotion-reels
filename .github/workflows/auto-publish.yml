name: 🚀 Auto-Publish Daily Reels

on:
  schedule:
    # Runs at 08:00 UTC and 17:00 UTC every day
    - cron: '0 8,17 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  publish-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install @supabase/supabase-js axios

      - name: Run Publishing Engine
        run: node scripts/post-video.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}
